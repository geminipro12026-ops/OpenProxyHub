<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenProxyHub</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .tag {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #334155;
      margin-left: 5px;
    }

    button {
      padding: 8px;
      margin: 3px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
    }

    .ok { background: #16a34a; }
    .warn { background: #f59e0b; }
    .bad { background: #ef4444; }
  </style>
</head>

<body>

<h2>OpenProxyHub</h2>

<div id="app"></div>

<script>

// ===== PLUGIN ENGINE =====
let plugins = [
  {
    name: "BPB Panel",
    type: "API",
    status: "disconnected",
    users: 0,
    connect: function() {
      this.status = "connecting...";
      render();

      setTimeout(() => {
        this.status = "connected (mock API)";
        this.users = 12;
        render();
      }, 1000);
    }
  },

  {
    name: "Nahan Panel",
    type: "DB",
    status: "disconnected",
    users: 0,
    connect: function() {
      this.status = "syncing DB...";
      render();

      setTimeout(() => {
        this.status = "connected (mock DB)";
        this.users = 7;
        render();
      }, 1200);
    }
  },

  {
    name: "Custom Hybrid",
    type: "HYBRID",
    status: "idle",
    users: 0,
    connect: function() {
      this.status = "hybrid linking...";
      render();

      setTimeout(() => {
        this.status = "connected (hybrid mode)";
        this.users = 3;
        render();
      }, 800);
    }
  }
];

// ===== RENDER =====
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  plugins.forEach((p, i) => {

    let color = "warn";
    if (p.status.includes("connected")) color = "ok";
    if (p.status.includes("disconnected")) color = "bad";

    app.innerHTML += `
      <div class="card" onclick="openPlugin(${i})">
        🧩 ${p.name}
        <span class="tag">${p.type}</span>
        <br>
        Status: <b class="${color}">${p.status}</b>
        <br>
        Users: ${p.users}
        <br>
        <button onclick="connect(${i}); event.stopPropagation();">
          Connect
        </button>
      </div>
    `;
  });

  app.innerHTML += `<button onclick="addPlugin()">+ Add Plugin</button>`;
}

// ===== CONNECT LAYER =====
function connect(i) {
  plugins[i].connect();
}

// ===== OPEN =====
function openPlugin(i) {
  alert(
    "Plugin: " + plugins[i].name +
    "\nType: " + plugins[i].type +
    "\nStatus: " + plugins[i].status +
    "\nUsers: " + plugins[i].users
  );
}

// ===== ADD PLUGIN =====
function addPlugin() {
  let name = prompt("Plugin name:");
  let type = prompt("Type (API / DB / HYBRID):");

  if (name && type) {
    plugins.push({
      name,
      type,
      status: "new (manual)",
      users: 0,
      connect: function() {
        this.status = "manual connected";
        render();
      }
    });

    render();
  }
}

// START
render();

</script>

</body>
</html>
