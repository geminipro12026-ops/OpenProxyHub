
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenProxyHub</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      cursor: pointer;
    }

    button {
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>OpenProxyHub</h2>

<div id="serverList"></div>

<button onclick="addServer()">+ Add Server</button>

<script>
// گرفتن دیتا از حافظه مرورگر
let servers = JSON.parse(localStorage.getItem("servers")) || [
  { name: "Germany", status: "Online" },
  { name: "Finland", status: "Online" },
  { name: "Cloudflare", status: "Syncing" }
];

// ذخیره در مرورگر
function saveData() {
  localStorage.setItem("servers", JSON.stringify(servers));
}

// نمایش سرورها
function render() {
  const list = document.getElementById("serverList");
  list.innerHTML = "";

  servers.forEach((s, index) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "🖥 " + s.name + " - " + s.status;

    div.onclick = () => openServer(index);

    list.appendChild(div);
  });
}

// اضافه کردن سرور
function addServer() {
  const name = prompt("Server name:");
  if (name) {
    servers.push({ name, status: "Online" });
    saveData();
    render();
  }
}

// باز کردن سرور
function openServer(index) {
  alert("Server: " + servers[index].name + "\nStatus: " + servers[index].status);
}

// شروع
render();
</script>

</body>
</html>
