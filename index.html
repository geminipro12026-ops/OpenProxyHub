<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenProxyHub</title>

  <!-- جلوگیری از cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .user {
      background: #334155;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
    }

    button {
      padding: 8px;
      margin: 3px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
    }

    .danger { background: #ef4444; }
  </style>
</head>

<body>

<h2>OpenProxyHub</h2>

<div id="app"></div>

<script>

// ===== FORCE FRESH LOAD =====
const VERSION = Date.now();

// ===== DATA =====
let servers = JSON.parse(localStorage.getItem("servers")) || [
  { name: "Germany", users: [] },
  { name: "Finland", users: [] }
];

let currentServer = null;

// ===== SAVE =====
function save() {
  localStorage.setItem("servers", JSON.stringify(servers));
}

// ===== RENDER =====
function render() {
  const app = document.getElementById("app");

  if (currentServer === null) {
    renderServers(app);
  } else {
    renderUsers(app);
  }
}

// ===== SERVERS =====
function renderServers(app) {
  app.innerHTML = `
    <button onclick="addServer()">+ Add Server</button>
  `;

  servers.forEach((s, i) => {
    app.innerHTML += `
      <div class="card" onclick="openServer(${i})">
        🖥 ${s.name} (${s.users.length} users)
      </div>
    `;
  });
}

// ===== USERS =====
function renderUsers(app) {
  let s = servers[currentServer];

  app.innerHTML = `
    <h3>${s.name}</h3>
    <button onclick="back()">← Back</button>
    <button onclick="addUser()">+ Add User</button>
  `;

  s.users.forEach((u, i) => {

    let status = "Active";
    if (u.used >= u.quota) status = "BLOCKED";
    else if (u.dailyUsed >= u.dailyLimit) status = "LIMITED";

    app.innerHTML += `
      <div class="user">
        👤 ${u.name} [${status}]<br>
        📦 ${u.used}/${u.quota} GB<br>
        📊 Daily: ${u.dailyUsed}/${u.dailyLimit} GB<br>

        <button onclick="useData(${i})">Use 1GB</button>
        <button class="danger" onclick="deleteUser(${i})">Delete</button>
      </div>
    `;
  });
}

// ===== LOGIC =====
function openServer(i) {
  currentServer = i;
  render();
}

function back() {
  currentServer = null;
  render();
}

function addServer() {
  let name = prompt("Server name:");
  if (name) {
    servers.push({ name, users: [] });
    save();
    render();
  }
}

function addUser() {
  let name = prompt("User name:");
  let quota = parseInt(prompt("Quota GB:"));
  let daily = parseInt(prompt("Daily limit GB:"));

  if (name && quota && daily) {
    servers[currentServer].users.push({
      name,
      quota,
      dailyLimit: daily,
      used: 0,
      dailyUsed: 0
    });

    save();
    render();
  }
}

function useData(i) {
  let u = servers[currentServer].users[i];

  if (u.used >= u.quota) return alert("BLOCKED");
  if (u.dailyUsed >= u.dailyLimit) return alert("DAILY LIMIT");

  u.used++;
  u.dailyUsed++;

  save();
  render();
}

function deleteUser(i) {
  servers[currentServer].users.splice(i, 1);
  save();
  render();
}

// START
render();

</script>

</body>
</html>
