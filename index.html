<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenProxyHub</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .tag {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #334155;
      margin-left: 5px;
    }

    button {
      padding: 8px;
      margin: 3px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
    }
  </style>
</head>

<body>

<h2>OpenProxyHub</h2>

<div id="app"></div>

<script>

// ===== PLUGINS (HYBRID CORE) =====
let plugins = [
  {
    name: "BPB Panel",
    type: "API",
    status: "connected",
    users: 0
  },
  {
    name: "Nahan Panel",
    type: "DB",
    status: "local",
    users: 0
  },
  {
    name: "Custom Panel",
    type: "Hybrid",
    status: "manual",
    users: 0
  }
];

// ===== RENDER =====
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  plugins.forEach((p, i) => {

    app.innerHTML += `
      <div class="card" onclick="openPlugin(${i})">
        🧩 ${p.name}
        <span class="tag">${p.type}</span>
        <br>
        Status: ${p.status}
        <br>
        Users: ${p.users}
      </div>
    `;
  });

  app.innerHTML += `<button onclick="addPlugin()">+ Add Plugin</button>`;
}

// ===== OPEN PLUGIN =====
function openPlugin(i) {
  alert(
    "Plugin: " + plugins[i].name +
    "\nType: " + plugins[i].type +
    "\nStatus: " + plugins[i].status
  );
}

// ===== ADD PLUGIN =====
function addPlugin() {
  let name = prompt("Plugin name:");
  let type = prompt("Type (API / DB / Hybrid):");

  if (name && type) {
    plugins.push({
      name,
      type,
      status: "new",
      users: 0
    });

    render();
  }
}

// START
render();

</script>

</body>
</html>
