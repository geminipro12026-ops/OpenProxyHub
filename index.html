<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenProxyHub</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      cursor: pointer;
    }

    button {
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      margin: 5px 0;
    }

    .user {
      background: #334155;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>OpenProxyHub</h2>

<div id="serverList"></div>

<div id="panel" style="display:none;">
  <h3 id="serverTitle"></h3>

  <button onclick="addUser()">+ Add User</button>
  <button onclick="back()">← Back</button>

  <div id="userList"></div>
</div>

<button onclick="addServer()">+ Add Server</button>

<script>

// ===== DATA =====
let servers = JSON.parse(localStorage.getItem("servers")) || [
  { name: "Germany", users: [] },
  { name: "Finland", users: [] }
];

let currentServer = null;

// ===== SAVE =====
function save() {
  localStorage.setItem("servers", JSON.stringify(servers));
}

// ===== RENDER SERVERS =====
function renderServers() {
  document.getElementById("panel").style.display = "none";

  const list = document.getElementById("serverList");
  list.innerHTML = "";

  servers.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "🖥 " + s.name + " (" + s.users.length + " users)";

    div.onclick = () => openServer(i);

    list.appendChild(div);
  });
}

// ===== OPEN SERVER =====
function openServer(index) {
  currentServer = index;

  document.getElementById("serverList").style.display = "none";
  document.getElementById("panel").style.display = "block";

  document.getElementById("serverTitle").innerText =
    "Server: " + servers[index].name;

  renderUsers();
}

// ===== USERS =====
function renderUsers() {
  const list = document.getElementById("userList");
  list.innerHTML = "";

  servers[currentServer].users.forEach((u, i) => {
    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      👤 ${u.name} <br>
      📦 ${u.quota}GB
      <br><button onclick="deleteUser(${i})">Delete</button>
    `;

    list.appendChild(div);
  });
}

// ===== ADD USER =====
function addUser() {
  const name = prompt("User name:");
  const quota = prompt("Quota (GB):");

  if (name && quota) {
    servers[currentServer].users.push({
      name,
      quota
    });

    save();
    renderUsers();
  }
}

// ===== DELETE USER =====
function deleteUser(i) {
  servers[currentServer].users.splice(i, 1);
  save();
  renderUsers();
}

// ===== BACK =====
function back() {
  document.getElementById("serverList").style.display = "block";
  renderServers();
}

// ===== ADD SERVER =====
function addServer() {
  const name = prompt("Server name:");
  if (name) {
    servers.push({ name, users: [] });
    save();
    renderServers();
  }
}

// START
renderServers();

</script>

</body>
</html>
